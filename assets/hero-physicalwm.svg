<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">Physical world model diagram</title>
  <desc id="desc">Abstract robot arm, object graph, sensor signals, and predicted physical trajectories.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071019"/>
      <stop offset="0.55" stop-color="#0d2131"/>
      <stop offset="1" stop-color="#122d3d"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#23b7ff"/>
      <stop offset="1" stop-color="#79f2c0"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b29dff"/>
      <stop offset="1" stop-color="#23b7ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="640" rx="34" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#fff" stroke-width="1">
    <path d="M0 520h900M0 460h900M0 400h900M0 340h900M0 280h900M0 220h900M0 160h900M0 100h900"/>
    <path d="M80 0v640M160 0v640M240 0v640M320 0v640M400 0v640M480 0v640M560 0v640M640 0v640M720 0v640M800 0v640"/>
  </g>
  <g opacity="0.2" fill="none" stroke="#79f2c0" stroke-width="2">
    <path d="M84 488C185 394 269 533 388 415S606 198 813 270"/>
    <path d="M80 418C210 330 291 402 390 305S590 182 818 174"/>
  </g>
  <g transform="translate(110 350)" filter="url(#glow)">
