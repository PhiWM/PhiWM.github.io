    <circle cx="126" cy="26" r="32" fill="rgba(121,242,192,0.12)" stroke="#79f2c0"/>
    <circle cx="66" cy="112" r="26" fill="rgba(178,157,255,0.16)" stroke="#b29dff"/>
    <path d="M27 6 94 20M116 56 82 91M52 91 15 24" stroke="rgba(255,255,255,0.55)"/>
    <g fill="#fff" stroke="none" opacity="0.78">
      <circle cx="0" cy="0" r="4"/><circle cx="126" cy="26" r="4"/><circle cx="66" cy="112" r="4"/>
    </g>
  </g>
  <g transform="translate(116 86)">
    <rect x="0" y="0" width="300" height="166" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
    <text x="24" y="42" fill="#79f2c0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">state = f(sensors, actions)</text>
