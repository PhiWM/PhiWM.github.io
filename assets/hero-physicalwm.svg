    <circle cx="58" cy="112" r="34" fill="#0a1720" stroke="url(#cyan)" stroke-width="8"/>
    <path d="M58 112 154 38" stroke="url(#cyan)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="154" cy="38" r="26" fill="#0a1720" stroke="url(#cyan)" stroke-width="8"/>
