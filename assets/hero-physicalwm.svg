    <path d="M286 78l54-34M286 78l58 30" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g transform="translate(520 240)">
    <path d="M0 62 106 0l110 64-106 62z" fill="rgba(35,183,255,0.22)" stroke="#23b7ff" stroke-width="2"/>
    <path d="M0 62v126l110 64V126z" fill="rgba(121,242,192,0.12)" stroke="#79f2c0" stroke-width="2"/>
    <path d="M216 64v126l-106 62V126z" fill="rgba(178,157,255,0.18)" stroke="#b29dff" stroke-width="2"/>
    <path d="M0 62 110 126 216 64M110 126v126" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <circle cx="108" cy="126" r="8" fill="#79f2c0"/>
  </g>
  <g transform="translate(590 72)" stroke-width="2.4" fill="none">
