  </g>
  <g fill="#79f2c0" opacity="0.9">
    <circle cx="734" cy="526" r="6"/><circle cx="786" cy="500" r="4"/><circle cx="816" cy="548" r="7"/>
    <circle cx="464" cy="188" r="5"/><circle cx="432" cy="246" r="4"/><circle cx="376" cy="292" r="6"/>
  </g>
</svg>
